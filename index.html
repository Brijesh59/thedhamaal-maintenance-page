<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Dhamaal — Under Maintenance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }

  @keyframes floaty {
    0%, 100% { transform: translateY(0) rotate(-1.2deg); }
    50% { transform: translateY(-14px) rotate(1.2deg); }
  }
  @keyframes pop {
    0% { transform: scale(0.96); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  .wrap {
    min-height: 100vh;
    width: 100%;
    box-sizing: border-box;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 48px 24px;
    font-family: 'Poppins', system-ui, sans-serif;
    background-color: #F6F1E6;
    background-image:
      radial-gradient(circle at 18% 22%, rgba(31,163,204,0.10), transparent 38%),
      radial-gradient(circle at 84% 78%, rgba(253,196,10,0.14), transparent 40%),
      radial-gradient(rgba(28,37,48,0.045) 1.4px, transparent 1.4px);
    background-size: auto, auto, 22px 22px;
    position: relative;
    overflow: hidden;
  }

  .card {
    width: 100%;
    max-width: 620px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    position: relative;
    z-index: 2;
  }

  .logo-float {
    animation: floaty 6s ease-in-out infinite;
    will-change: transform;
  }
  .logo-float img {
    width: 248px;
    max-width: 64vw;
    height: auto;
    display: block;
    filter: drop-shadow(0 18px 28px rgba(28,37,48,0.16));
  }

  .badge {
    margin-top: 14px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 7px 16px;
    border-radius: 999px;
    background: #ffffff;
    border: 2px solid #1c2530;
    box-shadow: 3px 3px 0 #1c2530;
    animation: pop 0.5s ease both;
  }
  .badge .dot {
    width: 9px;
    height: 9px;
    border-radius: 999px;
    background: #1FA3CC;
    box-shadow: 0 0 0 4px rgba(31,163,204,0.18);
  }
  .badge .txt {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #1c2530;
  }

  h1 {
    margin: 26px 0 0;
    font-weight: 600;
    font-size: clamp(34px, 6.4vw, 56px);
    line-height: 1.04;
    letter-spacing: -0.02em;
    color: #1c2530;
  }

  .lede {
    margin: 20px 0 0;
    max-width: 460px;
    font-size: clamp(16px, 2.4vw, 18px);
    line-height: 1.6;
    color: #4a5560;
  }

  .panel {
    margin-top: 36px;
    width: 100%;
    max-width: 420px;
    background: #ffffff;
    border: 2.5px solid #1c2530;
    border-radius: 20px;
    box-shadow: 6px 6px 0 #1c2530;
    padding: 22px 24px 24px;
    box-sizing: border-box;
  }
  .panel .label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: #8a929b;
  }
  .panel .time {
    margin-top: 6px;
    font-weight: 700;
    font-size: clamp(22px, 4vw, 27px);
    color: #1c2530;
    letter-spacing: -0.01em;
  }

  .contact {
    margin-top: 30px;
    font-size: 14px;
    color: #8a929b;
  }
  .contact a {
    color: #1c2530;
    font-weight: 600;
    text-decoration: none;
    border-bottom: 2px solid #FDC40A;
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="logo-float">
      <img src="logo.png" alt="TheDhamaal">
    </div>

    <div class="badge">
      <span class="dot"></span>
      <span class="txt">Under Maintenance</span>
    </div>

    <h1>We're getting<br>a quick upgrade</h1>

    <p class="lede">The Dhamaal is getting a quick upgrade so we can make the experience smoother for users and organizers. Thanks for your patience.</p>

    <div class="panel">
      <div class="label">Back online by</div>
      <div class="time">Thursday, 1 July · 4:00 PM IST</div>
    </div>

    <div class="contact">Need help? <a href="mailto:support@thedhamaal.com">support@thedhamaal.com</a></div>
  </div>
</div>
</body>
</html>
